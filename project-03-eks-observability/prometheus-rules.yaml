apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cleerly-slo-rules
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    # ─────────────────────────────────────────────
    # SLO Recording Rules
    # ─────────────────────────────────────────────
    - name: cleerly.api.slo
      interval: 30s
      rules:
        - record: job:http_requests:rate5m
          expr: sum(rate(http_requests_total{job="cleerly-api"}[5m])) by (job)

        - record: job:http_errors:rate5m
          expr: sum(rate(http_requests_total{job="cleerly-api",status=~"5.."}[5m])) by (job)

        - record: job:http_error_ratio:rate5m
          expr: job:http_errors:rate5m / job:http_requests:rate5m

        - record: job:http_latency_p99:rate5m
          expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket{job="cleerly-api"}[5m]))

        - record: job:http_latency_p95:rate5m
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="cleerly-api"}[5m]))

    # ─────────────────────────────────────────────
    # Alert Rules
    # ─────────────────────────────────────────────
    - name: cleerly.api.alerts
      rules:
        - alert: HighErrorRate
          expr: job:http_error_ratio:rate5m > 0.01
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "High error rate on cleerly-api"
            description: "Error ratio is {{ $value | humanizePercentage }} — SLO breach imminent"
            runbook_url: "https://wiki.cleerly.com/runbooks/high-error-rate"

        - alert: HighLatencyP99
          expr: job:http_latency_p99:rate5m > 2.0
          for: 10m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "p99 latency above 2 seconds"
            description: "p99 latency is {{ $value | humanizeDuration }}"

        - alert: PodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="production"}[15m]) * 60 * 15 > 5
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Pod restarted {{ $value }} times in the last 15 minutes"

        - alert: NodeMemoryPressure
          expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) < 0.10
          for: 5m
          labels:
            severity: warning
            team: platform
          annotations:
            summary: "Node {{ $labels.instance }} memory below 10%"

        - alert: PersistentVolumeAlmostFull
          expr: (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) < 0.15
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} is 85%+ full"
