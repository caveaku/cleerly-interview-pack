apiVersion: sloth.slok.dev/v1
kind: PrometheusServiceLevel
metadata:
  name: cleerly-api-slos
  namespace: monitoring
spec:
  service: cleerly-api

  labels:
    team: platform
    env: prod
    hipaa: "true"

  slos:
    # ─────────────────────────────────────────────
    # SLO 1: API Availability — 99.9% uptime
    # Error budget: 43.8 minutes of downtime/month allowed
    # ─────────────────────────────────────────────
    - name: requests-availability
      objective: 99.9
      description: "99.9% of API requests succeed (non-5xx)"
      sli:
        events:
          errorQuery: |
            sum(rate(http_requests_total{
              job="cleerly-api",
              status=~"5.."
            }[{{.window}}]))
          totalQuery: |
            sum(rate(http_requests_total{
              job="cleerly-api"
            }[{{.window}}]))
      alerting:
        name: ClearlyAPIHighErrorRate
        labels:
          category: availability
        annotations:
          runbook: https://wiki.cleerly.com/runbooks/api-high-error-rate
          dashboard: https://grafana.cleerly.com/d/api-slo
        pageAlert:
          labels:
            severity: critical
            oncall: platform-team
        ticketAlert:
          labels:
            severity: warning
            team: platform

    # ─────────────────────────────────────────────
    # SLO 2: CT Scan Processing Latency
    # 99.5% of scans processed within 30 seconds
    # ─────────────────────────────────────────────
    - name: scan-processing-latency
      objective: 99.5
      description: "99.5% of CT scans are processed within 30 seconds (p99 < 30s)"
      sli:
        events:
          errorQuery: |
            sum(rate(scan_processing_duration_seconds_bucket{
              job="cleerly-scan-processor",
              le="30"
            }[{{.window}}]))
          totalQuery: |
            sum(rate(scan_processing_duration_seconds_count{
              job="cleerly-scan-processor"
            }[{{.window}}]))
      alerting:
        name: CleerlyScanLatencyHigh
        labels:
          category: latency
        annotations:
          runbook: https://wiki.cleerly.com/runbooks/scan-latency
        pageAlert:
          labels:
            severity: critical
        ticketAlert:
          labels:
            severity: warning

    # ─────────────────────────────────────────────
    # SLO 3: Report Generation Availability
    # 99.95% of report requests succeed
    # ─────────────────────────────────────────────
    - name: report-generation-availability
      objective: 99.95
      description: "99.95% of cardiac report generation requests succeed"
      sli:
        events:
          errorQuery: |
            sum(rate(report_generation_total{
              job="cleerly-report-service",
              result="error"
            }[{{.window}}]))
          totalQuery: |
            sum(rate(report_generation_total{
              job="cleerly-report-service"
            }[{{.window}}]))
      alerting:
        name: ClearlyReportGenerationFailing
        labels:
          category: availability
          severity: critical
        annotations:
          runbook: https://wiki.cleerly.com/runbooks/report-generation
