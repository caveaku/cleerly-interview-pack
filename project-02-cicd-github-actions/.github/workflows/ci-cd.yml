name: Build → Scan → Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REGISTRY: 123456789012.dkr.ecr.us-east-1.amazonaws.com
  IMAGE_NAME:   cleerly-api

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build & Push to ECR
  # ──────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.build.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC (no long-lived keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx (layer caching)
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push Docker image
        id: build
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build \
            --cache-from type=registry,ref=$ECR_REGISTRY/$IMAGE_NAME:cache \
            --cache-to type=registry,ref=$ECR_REGISTRY/$IMAGE_NAME:cache,mode=max \
            --build-arg BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --build-arg GIT_COMMIT=$IMAGE_TAG \
            -t $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG \
            -t $ECR_REGISTRY/$IMAGE_NAME:latest \
            .
          docker push $ECR_REGISTRY/$IMAGE_NAME:$IMAGE_TAG
          docker push $ECR_REGISTRY/$IMAGE_NAME:latest
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # JOB 2: Security Scanning (blocks deploy on CRITICAL/HIGH CVEs)
  # ──────────────────────────────────────────────
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Trivy — image vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Run Trivy — filesystem secrets & misconfig scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          scanners: secret,misconfig

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif

  # ──────────────────────────────────────────────
  # JOB 3: Deploy via GitOps (ArgoCD)
  # ──────────────────────────────────────────────
  deploy:
    needs: [build, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Update Helm values with new image tag
        run: |
          cd k8s/helm/cleerly-api
          sed -i "s/tag:.*/tag: ${{ needs.build.outputs.image-tag }}/" values-prod.yaml
          git config user.email "ci@cleerlyhealth.com"
          git config user.name "GitHub Actions Bot"
          git add values-prod.yaml
          git commit -m "chore(deploy): bump image to ${{ needs.build.outputs.image-tag }} [skip ci]"
          git push

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *cleerly-api* deployed to production\nCommit: `${{ needs.build.outputs.image-tag }}`\nBy: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 *cleerly-api* deployment FAILED\nCommit: `${{ needs.build.outputs.image-tag }}`\nActor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
